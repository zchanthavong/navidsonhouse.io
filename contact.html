	<div class="nav">

	<div class="paragraph">
	<main>
		<h2>Contact Form</h2>
		<hr>
		<img src="images/phone.jpg" alt="An image of a phone on a desk.">
		<p>Wish to rent out Navidson <span style=color:#0000FF>House</span>? Fill out the reservation below. All '*' is required.</p>
		<form>
			<label for="myName">Name*: </label>
			<input type="text" id="myName">
			<br>
			<label for="myEmail">E-mail*: </label>
			<input type="email" id="myEmail">
			<br>
			<label for="myStart">Start Date*: </label>
			<input type="date" id="myStart">
			<br>
			<label for="myEnd"># of Days*: </label>
			<input type="number" id="myEnd">
			<br>
			<label for="officeAccess">Access to Office: </label>
			<input type="checkbox" id="officeAccess">
			<br>
			<label for="myTip">Optional Tip:</label>
			<input type="number" id="myTip">
			<br>
			<label for="myInfo">Additional Info: </label>
			<textarea id="myInfo" rows="1" cols="20" ></textarea>
			<br>
			<input type="submit" value="Submit"><input type="reset">
		</form>
		<p>Total Cost: <span id="totalCost"></span></p>
		<hr>
	</main>
